name: E2E VertexAI Tests (Google Cloud)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - integration
  pull_request:
    branches: [main]
    types: [labeled]

env:
  NODE_VERSION: '20'

jobs:
  check-trigger:
    name: Check Trigger Conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.run }}
    steps:
      - name: Check conditions
        id: check
        run: |
          RUN="false"

          # Run on manual trigger
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RUN="true"
          fi

          # Run if PR has 'e2e-vertexai' label
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q "e2e-vertexai"; then
              RUN="true"
            fi
          fi

          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "Should run: $RUN"

  integration-tests:
    name: Integration Tests (VertexAI)
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run VertexAI integration tests
        if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event_name == 'pull_request'
        run: npx vitest run tests/e2e/integration.vertexai.test.ts --bail=0 --testTimeout=120000
        env:
          NODE_ENV: test
          # Vertex AI credentials (individual secrets)
          VERTEX_CLIENT_EMAIL: ${{ secrets.VERTEX_CLIENT_EMAIL }}
          VERTEX_PRIVATE_KEY: ${{ secrets.VERTEX_PRIVATE_KEY }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION || 'us-central1' }}
          # GCS configuration for video files
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          # Model configuration
          IMAGE_MODEL: ${{ secrets.VERTEX_IMAGE_MODEL || 'gemini-2.5-flash-lite' }}
          VIDEO_MODEL: ${{ secrets.VERTEX_VIDEO_MODEL || 'gemini-2.5-flash' }}
          LOG_LEVEL: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vertexai-integration-test-results
          path: test-results/
          retention-days: 7

  youtube-tests:
    name: YouTube Video Tests (VertexAI)
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run YouTube E2E tests
        if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event_name == 'pull_request'
        run: npx vitest run tests/e2e/youtube.vertexai.test.ts --bail=0 --testTimeout=120000
        env:
          NODE_ENV: test
          # Vertex AI credentials (individual secrets)
          VERTEX_CLIENT_EMAIL: ${{ secrets.VERTEX_CLIENT_EMAIL }}
          VERTEX_PRIVATE_KEY: ${{ secrets.VERTEX_PRIVATE_KEY }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION || 'us-central1' }}
          # YouTube API key (optional)
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Model configuration
          IMAGE_MODEL: ${{ secrets.VERTEX_IMAGE_MODEL || 'gemini-2.5-flash-lite' }}
          VIDEO_MODEL: ${{ secrets.VERTEX_VIDEO_MODEL || 'gemini-2.5-flash' }}
          # Set providers to vertex_ai
          IMAGE_PROVIDER: vertex_ai
          VIDEO_PROVIDER: vertex_ai
          LOG_LEVEL: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vertexai-youtube-test-results
          path: test-results/
          retention-days: 7
