name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild sharp for Linux
        run: npm rebuild sharp --platform=linux --arch=x64

      - name: Run linter
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Verify package can be imported
        run: |
          node -e "import('./dist/index.js').then(() => console.log('✅ Package imports successfully')).catch(e => { console.error('❌ Import failed:', e); process.exit(1) })"
