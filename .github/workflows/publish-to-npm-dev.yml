name: Publish to npm (dev)

on:
  # Trigger on tags with -dev suffix (e.g., v1.0.0-dev.1)
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-dev*'
  # Manual trigger
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g., dev.1, beta.2)'
        required: true
        default: 'dev'
        type: string

jobs:
  publish-dev:
    name: Publish Dev Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            # Extract version from tag (remove 'v' prefix)
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            DEV_VERSION="${TAG_VERSION}"
          else
            # Manual trigger - use suffix input
            SUFFIX="${{ inputs.version_suffix }}"
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            DEV_VERSION="${BASE_VERSION}-${SUFFIX}.${DATE}.${SHORT_SHA}"
          fi

          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "DEV_VERSION=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Base version: ${BASE_VERSION}"
          echo "🔧 Dev version: ${DEV_VERSION}"

      - name: Update package.json with dev version
        run: |
          jq '.version = "${{ steps.version.outputs.DEV_VERSION }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish to npm with dev tag
        run: npm publish --tag dev --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output publish info
        run: |
          echo "✨ Published ai-vision-mcp@${{ steps.version.outputs.DEV_VERSION }}"
          echo "Install: npm install ai-vision-mcp@dev"
