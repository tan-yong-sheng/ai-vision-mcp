name: E2E Tests (No API)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  protocol-validation:
    name: Protocol & Validation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run protocol tests
        run: npm run test:e2e:protocol
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-api-key-for-e2e-tests

      - name: Run validation tests
        run: npx vitest run tests/e2e/validation.test.ts
        env:
          NODE_ENV: test
          GEMINI_API_KEY: test-api-key-for-e2e-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-validation-results
          path: test-results/
          retention-days: 7
