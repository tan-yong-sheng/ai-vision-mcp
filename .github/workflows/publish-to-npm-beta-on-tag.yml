name: Publish to npm (beta) on beta tag push

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

jobs:
  publish-beta:
    name: Publish Beta Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify beta version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$PACKAGE_VERSION" =~ -beta\.[0-9]+$ ]]; then
            echo "❌ Version $PACKAGE_VERSION is not a beta version"
            exit 1
          fi
          echo "✅ Beta version: $PACKAGE_VERSION"

      - name: Publish to npm with beta tag
        run: npm publish --tag beta --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output publish info
        run: |
          echo "✨ Published ai-vision-mcp@$(node -p "require('./package.json').version")"
          echo "Install: npm install ai-vision-mcp@beta"
