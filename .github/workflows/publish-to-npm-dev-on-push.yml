name: Publish to npm (dev) on push to main

on:
  push:
    branches: [main]

jobs:
  publish-dev:
    name: Publish Dev Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Create dev version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          DEV_VERSION="${BASE_VERSION}-dev.${DATE}.${SHORT_SHA}"
          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "DEV_VERSION=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Base version: ${BASE_VERSION}"
          echo "🔧 Dev version: ${DEV_VERSION}"

      - name: Update package.json with dev version
        run: |
          jq '.version = "${{ steps.version.outputs.DEV_VERSION }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish to npm with dev tag
        run: npm publish --tag dev --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output publish info
        run: |
          echo "✨ Published ai-vision-mcp@${{ steps.version.outputs.DEV_VERSION }}"
          echo "Install: npm install ai-vision-mcp@dev"
